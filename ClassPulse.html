  ══════════════════════════════════════════════════════════════════════

  ──────────────────────────────────────────────────────────────────────
  Visual Direction: Deep navy sidebar · warm white content · teal accent
  Typeface: Plus Jakarta Sans 400/500/600/700/800

  COLOR TOKENS
    --navy-900   #0F1E33   Sidebar bg
    --navy-800   #162740   Sidebar hover
    --navy-700   #1F3556   Sidebar active tint
    --accent     #2B95AE   CTAs, active states, links

    --on-task    #27996A   On-task green

    --off-task   #E07535   Off-task amber (not red — not alarming)
    --off-task-bg rgba(224,117,53,0.10) Off-task bg
    --offline    #A0B0BE   Offline/unknown gray
    --warn       #F0A84A   Threshold alerts
    --danger     #D45C5C   Blocked/severe
    --surface    #FFFFFF   Card/panel bg
    --bg         #F2F4F6   App background
    --border     #E1E8EF   Dividers, borders
    --text-1     #1A2635   Primary text
    --text-2     #5A6A7A   Secondary text
    --text-3     #8A9BAA   Muted/caption text

  SPACING SCALE: 4 8 12 16 20 24 32 40 48
  RADIUS: 6(sm) 8(btn) 10(input) 12(card) 16(lg) 20(xl) 999(pill)
  SHADOWS:
    --s-card   0 1px 3px rgba(15,30,51,0.08), 0 4px 12px rgba(15,30,51,0.04)
    --s-modal  0 8px 32px rgba(15,30,51,0.16)
  ══════════════════════════════════════════════════════════════════════
  -->

/* ── PRIMITIVES ──────────────────────────────────────────────────────── */

const AVATAR_COLORS = ['#2B95AE','#27996A','#8B5CF6','#E07535','#EC4899','#3B82F6','#10B981','#F59E0B'];

const Ava = ({ ini, size=36 }) => {
  const bg = AVATAR_COLORS[ini.charCodeAt(0) % AVATAR_COLORS.length];
  return (
    <div style={{
      width:size, height:size, borderRadius:'50%', background:bg, color:'#fff',
      display:'flex', alignItems:'center', justifyContent:'center',
      fontSize:size*0.33, fontWeight:700, letterSpacing:'-0.01em', flexShrink:0,
    }}>{ini}</div>
  );
};

const Badge = ({ children, variant='default' }) => {
  const bMap = {
    default: { background:'var(--bg)', color:'var(--text-2)', border:'1px solid var(--border)' },
    accent:  { background:'var(--accent-lt)', color:'var(--accent)' },
    success: { background:'var(--on-task-bg)', color:'var(--on-task)' },
    warning: { background:'var(--off-task-bg)', color:'var(--off-task)' },
    offline: { background:'rgba(160,176,190,0.12)', color:'var(--offline)' },
  };
  return (
    <span style={{
      display:'inline-flex', alignItems:'center', gap:4,
      padding:'2px 8px', borderRadius:999, fontSize:11, fontWeight:600,
      ...bMap[variant],
    }}>{children}</span>
  );
};

const Btn = ({ children, variant='primary', size='md', onClick, icon, disabled, sx }) => {
  const [hov, setHov] = useState(false);
  const baseS = { display:'inline-flex', alignItems:'center', gap:6, fontFamily:'inherit', fontWeight:600, cursor:disabled?'not-allowed':'pointer', border:'none', borderRadius:8, transition:'all 0.15s', opacity:disabled?0.5:1 };
  const sizeS = { sm:{padding:'6px 12px',fontSize:12}, md:{padding:'9px 16px',fontSize:13}, lg:{padding:'12px 20px',fontSize:14} };
  const varS = {
    primary: { background:hov?'var(--accent-h)':'var(--accent)', color:'#fff' },
    secondary: { background:hov?'var(--bg)':'transparent', color:'var(--text-2)', border:'1px solid var(--border)' },
    ghost: { background:hov?'var(--bg)':'transparent', color:'var(--text-2)' },
    danger: { background:hov?'#C0504F':'var(--danger)', color:'#fff' },
  };
  return (
    <button style={{ ...baseS, ...sizeS[size], ...varS[variant], ...sx }}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      onClick={onClick} disabled={disabled}>
      {icon && <Ic n={icon} size={size==='sm'?12:14} />}
      {children}
    </button>
  );
};

const SearchInput = ({ placeholder, value, onChange, sx }) => (

    <nav style={{
      width:'var(--sidebar-w)', background:'var(--navy-900)',

      position:'fixed', top:0, left:0, zIndex:100,

      {/* Wordmark */}
      <div style={{ padding:'20px 20px 10px', display:'flex', alignItems:'center', gap:10 }}>
        <div style={{ width:32, height:32, borderRadius:9, background:'var(--accent)', display:'flex', alignItems:'center', justifyContent:'center' }}>
          <Ic n="zap" size={17} color="#fff" />
        </div>

          </div>
          <Ic n="chevD" size={12} color="rgba(255,255,255,0.4)" />
        </button>
      </div>

      {/* Nav */}
      <div style={{ padding:'4px 8px', flex:1 }}>
        {NAV_ITEMS.map(item => {
          const active = activeFor(item.id);
          return (
            <button key={item.id} onClick={()=>setScreen(item.id)} style={{
              width:'100%', display:'flex', alignItems:'center', gap:10,
              padding:'9px 12px', borderRadius:7, cursor:'pointer', marginBottom:2,
              background: active ? 'rgba(43,149,174,0.18)' : 'transparent',
              border:'none', color: active ? '#fff' : 'rgba(255,255,255,0.52)',
              fontSize:13, fontWeight: active ? 600 : 500,
              textAlign:'left', transition:'all 0.15s', fontFamily:'inherit',

              <Ic n={item.icon} size={16} color={active ? 'var(--accent)' : 'rgba(255,255,255,0.38)'} />

                  {item.badge}
                </span>
              )}
            </button>
          );
        })}
      </div>

      {/* User */}
      <div style={{ padding:'12px 12px 18px', borderTop:'1px solid rgba(255,255,255,0.06)' }}>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>

          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontSize:12, fontWeight:600, color:'#fff', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>Ms. Rivera</div>
            <div style={{ fontSize:10, color:'rgba(255,255,255,0.38)' }}>Jefferson Middle</div>

          <button style={{ background:'none', border:'none', cursor:'pointer', color:'rgba(255,255,255,0.3)', padding:4 }}>
            <Ic n="logout" size={14} />
          </button>
        </div>
      </div>
    </nav>
  );
};

/* ── FOCUS BANNER ────────────────────────────────────────────────────── */

const FocusBanner = ({ onEnd, timeLeft, setTimeLeft }) => {
  const [collapsed, setCollapsed] = useState(false);
  const mins = Math.floor(timeLeft / 60);
  const secs = String(timeLeft % 60).padStart(2, '0');

  useEffect(() => {
    const t = setInterval(() => setTimeLeft(v => v > 0 ? v - 1 : 0), 1000);
    return () => clearInterval(t);
  }, []);

  if (collapsed) return (
    <button onClick={()=>setCollapsed(false)} style={{
      position:'fixed', bottom:24, left:'50%', transform:'translateX(-50%)',
      background:'var(--on-task)', color:'#fff', border:'none',
      borderRadius:999, padding:'8px 20px', fontSize:12, fontWeight:700,
      cursor:'pointer', display:'flex', alignItems:'center', gap:8,
      boxShadow:'0 4px 20px rgba(39,153,106,0.35)', zIndex:200, fontFamily:'inherit',
    }}>
      <div style={{ width:8, height:8, borderRadius:'50%', background:'#fff', animation:'pulse 1.5s infinite' }} />
      Focus Active · {mins}:{secs}
    </button>
  );

  return (
    <div style={{
      position:'fixed', top:'var(--topbar-h)', left:'var(--sidebar-w)', right:0,
      background:'var(--navy-900)', color:'#fff', zIndex:150,
      display:'flex', alignItems:'center', gap:16, padding:'12px 24px',
      borderBottom:'2px solid var(--on-task)',
    }}>
      <div style={{ width:10, height:10, borderRadius:'50%', background:'var(--on-task)', flexShrink:0 }} />
      <div style={{ flex:1 }}>
        <div style={{ fontSize:13, fontWeight:700 }}>Silent Reading Session · Writing Workshop policy active</div>
        <div style={{ fontSize:11, color:'rgba(255,255,255,0.45)', marginTop:2 }}>24 devices locked · 18 on-task, 4 off-task, 2 offline</div>
      </div>
      <div style={{ fontSize:30, fontWeight:800, fontVariantNumeric:'tabular-nums', color:timeLeft<60?'var(--warn)':'#fff', minWidth:72, textAlign:'right' }}>
        {mins}:{secs}
      </div>
      <Btn variant="secondary" size="sm" onClick={()=>setCollapsed(true)}>Minimize</Btn>
      <Btn variant="danger" size="sm" onClick={onEnd}>End Session</Btn>
    </div>
  );
};

const PolicyEditorScreen = ({ setScreen }) => {
  const [step, setStep] = useState(1);
  const [mode, setMode] = useState(null);
  const [policyName, setPolicyName] = useState('');
  const [query, setQuery] = useState('');
  const [selected, setSelected] = useState([]);
  const [platform, setPlatform] = useState('ios');

  const toggle = (app) =>
    setSelected(prev => prev.find(a=>a.id===app.id) ? prev.filter(a=>a.id!==app.id) : [...prev, app]);
  const filtered = APP_CATALOG.filter(a => a.name.toLowerCase().includes(query.toLowerCase()));

  return (
    <div style={{ padding:'28px', maxWidth:760, margin:'0 auto' }}>
      {/* Header */}
      <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:24 }}>
        <button onClick={()=>step>1?setStep(s=>s-1):setScreen('policies')} style={{ background:'none', border:'none', cursor:'pointer', color:'var(--text-3)', padding:4 }}>
          <Ic n="back" size={18} />
        </button>
        <div>
          <h1 style={{ fontSize:18, fontWeight:800, color:'var(--text-1)' }}>New Policy</h1>
          <p style={{ fontSize:12, color:'var(--text-3)' }}>Step {step} of 3</p>
        </div>
      </div>

      {/* Progress bar */}
      <div style={{ display:'flex', gap:4, marginBottom:28 }}>
        {[1,2,3].map(s => (
          <div key={s} style={{ flex:1, height:3, borderRadius:2, background:s<=step?'var(--accent)':'var(--border)', transition:'background 0.3s' }} />
        ))}
      </div>

      {/* STEP 1: Choose mode */}
      {step===1 && (
        <div>
          <h2 style={{ fontSize:16, fontWeight:700, color:'var(--text-1)', marginBottom:6 }}>What kind of policy?</h2>
          <p style={{ fontSize:13, color:'var(--text-2)', marginBottom:20 }}>This determines what students can access during the lesson.</p>

          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:22 }}>
            {[
              { id:'allow', title:'Allow list only', desc:'Students can only use apps you specifically approve. Everything else is blocked. Best for focused sessions.', icon:'check', color:'var(--on-task)', bg:'var(--on-task-bg)' },
              { id:'block', title:'Block list',      desc:'Students can use anything except the apps you block. Best for open research time with distractions removed.', icon:'x',    color:'var(--off-task)', bg:'var(--off-task-bg)' },
            ].map(opt => (
              <div key={opt.id} onClick={()=>setMode(opt.id)} style={{
                background:'var(--surface)', borderRadius:14, padding:'22px',
                border:`2px solid ${mode===opt.id?opt.color:'var(--border)'}`,
                cursor:'pointer', transition:'all 0.15s',
                boxShadow:mode===opt.id?`0 4px 20px ${opt.bg}`:'var(--s-card)',
              }}>
                <div style={{ width:42, height:42, borderRadius:12, background:opt.bg, display:'flex', alignItems:'center', justifyContent:'center', marginBottom:14 }}>
                  <Ic n={opt.icon} size={22} color={opt.color} />
                </div>
                <div style={{ fontSize:15, fontWeight:700, color:'var(--text-1)', marginBottom:8 }}>{opt.title}</div>
                <div style={{ fontSize:12, color:'var(--text-2)', lineHeight:1.6 }}>{opt.desc}</div>
                {mode===opt.id && (
                  <div style={{ marginTop:12, display:'flex', alignItems:'center', gap:6, fontSize:12, fontWeight:600, color:opt.color }}>
                    <Ic n="check" size={13} color={opt.color} />Selected
                  </div>
                )}
              </div>
            ))}
          </div>

          {/* Safety note */}
          <div style={{ display:'flex', gap:10, padding:'12px 16px', background:'rgba(43,149,174,0.06)', borderRadius:10, border:'1px solid rgba(43,149,174,0.15)', marginBottom:22 }}>
            <Ic n="shield" size={14} color="var(--accent)" />
            <p style={{ fontSize:12, color:'var(--text-2)', lineHeight:1.6 }}>
              Emergency services (911), accessibility features (VoiceOver, TalkBack), and all system functions are always available — regardless of policy settings.
            </p>
          </div>

          <div style={{ marginBottom:18 }}>
            <input placeholder="Policy name (e.g. Silent Reading)"
              value={policyName} onChange={e=>setPolicyName(e.target.value)}
              style={{ width:'100%', padding:'10px 14px', fontFamily:'inherit', fontSize:13, color:'var(--text-1)', background:'var(--surface)', border:'1px solid var(--border)', borderRadius:9, outline:'none' }} />
          </div>
          <Btn variant="primary" disabled={!mode||!policyName} onClick={()=>setStep(2)}>Continue →</Btn>
        </div>
      )}

      {/* STEP 2: Pick apps */}
      {step===2 && (
        <div>
          <h2 style={{ fontSize:16, fontWeight:700, color:'var(--text-1)', marginBottom:6 }}>
            {mode==='allow' ? 'Which apps can students use?' : 'Which apps should be blocked?'}
          </h2>
          <p style={{ fontSize:13, color:'var(--text-2)', marginBottom:20 }}>{selected.length} selected</p>
          <SearchInput placeholder="Search apps and websites…" value={query} onChange={e=>setQuery(e.target.value)} sx={{ marginBottom:14 }} />

          <div style={{ display:'flex', flexDirection:'column', gap:5, maxHeight:340, overflow:'auto', marginBottom:20 }}>
            {filtered.map(app => {
              const isSel = !!selected.find(a=>a.id===app.id);
              return (
                <div key={app.id} onClick={()=>toggle(app)} style={{
                  display:'flex', alignItems:'center', gap:12, padding:'10px 12px', borderRadius:9, cursor:'pointer',
                  background:isSel?'var(--accent-lt)':'var(--bg)',
                  border:`1px solid ${isSel?'rgba(43,149,174,0.25)':'transparent'}`,
                  transition:'all 0.15s',
                }}>
                  <div style={{ width:30, height:30, borderRadius:8, background:app.color, flexShrink:0 }} />
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:13, fontWeight:600, color:'var(--text-1)' }}>{app.name}</div>
                    <div style={{ fontSize:11, color:'var(--text-3)' }}>{app.cat}</div>
                  </div>
                  <div style={{
                    width:20, height:20, borderRadius:'50%',
                    background:isSel?'var(--accent)':'var(--surface)',
                    border:`1.5px solid ${isSel?'var(--accent)':'var(--border)'}`,
                    display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0,
                  }}>
                    {isSel && <Ic n="check" size={10} color="#fff" />}
                  </div>
                </div>
              );
            })}
          </div>

          <div style={{ display:'flex', gap:8 }}>
            <Btn variant="ghost" onClick={()=>setStep(1)}>← Back</Btn>
            <Btn variant="primary" disabled={selected.length===0} onClick={()=>setStep(3)}>Preview Policy →</Btn>
          </div>
        </div>
      )}

      {/* STEP 3: Preview */}
      {step===3 && (
        <div>
          <h2 style={{ fontSize:16, fontWeight:700, color:'var(--text-1)', marginBottom:6 }}>Policy preview</h2>
          <p style={{ fontSize:13, color:'var(--text-2)', marginBottom:20 }}>Exactly what happens on each device platform before you push.</p>

          {/* Platform tabs */}
          <div style={{ display:'flex', gap:3, marginBottom:16, background:'var(--bg)', padding:4, borderRadius:9, width:'fit-content' }}>
            {[['ios','iOS'],['android','Android'],['chromebook','ChromeOS'],['macos','macOS'],['windows','Windows']].map(([id,label]) => (
              <button key={id} onClick={()=>setPlatform(id)} style={{
                padding:'5px 14px', borderRadius:6, border:'none', cursor:'pointer', fontFamily:'inherit',
                background:platform===id?'var(--surface)':'transparent',
                color:platform===id?'var(--text-1)':'var(--text-3)',
                fontSize:11, fontWeight:platform===id?700:500,
                boxShadow:platform===id?'var(--s-card)':'none',
              }}>{label}</button>
            ))}
          </div>

          <div style={{ background:'var(--surface)', borderRadius:14, border:'1px solid var(--border)', padding:'20px', marginBottom:20 }}>
            <div style={{ fontSize:11, fontWeight:700, color:'var(--text-3)', marginBottom:14, textTransform:'uppercase', letterSpacing:'0.06em' }}>
              {platform.toUpperCase()} — {mode==='allow'?'ALLOW LIST':'BLOCK LIST'} — {policyName}
            </div>
            {selected.map(app => (
              <div key={app.id} style={{ display:'flex', alignItems:'center', gap:10, marginBottom:10 }}>
                <div style={{ width:24, height:24, borderRadius:6, background:app.color }} />
                <span style={{ fontSize:13, color:'var(--text-1)', fontWeight:500, flex:1 }}>{app.name}</span>
                <Ic n="check" size={14} color="var(--on-task)" />
                <span style={{ fontSize:11, color:'var(--text-3)' }}>App + web</span>
              </div>
            ))}
            {platform==='windows' && (
              <div style={{ marginTop:14, padding:'9px 12px', background:'rgba(240,168,74,0.1)', borderRadius:7, fontSize:11, color:'#7A5A1A', display:'flex', gap:8 }}>
                <Ic n="alert" size={13} color="#F0A84A" />
                Windows: App-level enforcement requires ClassPulse agent v2.3+. URL blocking works on all versions.
              </div>
            )}
          </div>

          <div style={{ display:'flex', gap:8 }}>
            <Btn variant="ghost" onClick={()=>setStep(2)}>← Back</Btn>
            <Btn variant="primary" icon="zap">Save & Push to Class</Btn>
            <Btn variant="secondary">Save for Later</Btn>
          </div>
        </div>
      )}
    </div>
  );
};

        { label:'Off-task threshold',      val:'3 minutes',   disabled:false },
        { label:'Policy push failures',    val:'Immediate',   disabled:false },
        { label:'Weekly report email',     val:'Fridays',     disabled:false },
      ]},
      { section:'Privacy', items:[
        { label:'Monitoring hours',  val:'School hours only (auto)', disabled:true, note:'Set by your district administrator' },
        { label:'Data retention',    val:'90 days',                  disabled:true  },
      ]},
    ].map(group => (
      <div key={group.section} style={{ marginBottom:24 }}>
        <div style={{ fontSize:11, fontWeight:700, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:10 }}>{group.section}</div>
        <div style={{ background:'var(--surface)', borderRadius:13, border:'1px solid var(--border)', overflow:'hidden', boxShadow:'var(--s-card)' }}>
          {group.items.map((item,i) => (
            <div key={item.label} style={{
              display:'flex', alignItems:'center', justifyContent:'space-between',
              padding:'14px 18px',
              borderBottom:i<group.items.length-1?'1px solid var(--border)':'none',
            }}>
              <div>
                <div style={{ fontSize:13, fontWeight:500, color:'var(--text-1)' }}>{item.label}</div>
                {item.note && <div style={{ fontSize:11, color:'var(--text-3)', marginTop:2 }}>{item.note}</div>}
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                <span style={{ fontSize:13, color:item.disabled?'var(--text-3)':'var(--text-2)', fontWeight:500 }}>{item.val}</span>
                {!item.disabled && <Ic n="chevR" size={14} color="var(--text-3)" />}
              </div>
            </div>
          ))}
        </div>
      </div>
    ))}
  </div>
);

/* ── TWEAKS PANEL ────────────────────────────────────────────────────── */

const TweaksPanel = ({ show, tweaks, setTweaks, onClose }) => {
  if (!show) return null;
  const opts = [
    { key:'density',     label:'Grid density',      opts:['Compact','Default','Spacious'] },
    { key:'accentColor', label:'Accent color',       opts:['Teal','Blue','Indigo','Sage']  },
    { key:'statusStyle', label:'Status indicator',   opts:['Dot','Background','Border']    },
    { key:'showTime',    label:'Show "last updated"',opts:['Yes','No']                     },
  ];
  return (
    <div className="tweaks-panel">
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16 }}>
        <span style={{ fontSize:12, fontWeight:700, color:'var(--text-1)' }}>Tweaks</span>
        <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', color:'var(--text-3)' }}>
          <Ic n="x" size={14} />
        </button>
      </div>
      {opts.map(t => (
        <div key={t.key} style={{ marginBottom:14 }}>
          <div style={{ fontSize:11, fontWeight:600, color:'var(--text-2)', marginBottom:6 }}>{t.label}</div>
          <div style={{ display:'flex', flexWrap:'wrap', gap:4 }}>
            {t.opts.map(o => (
              <button key={o} onClick={()=>setTweaks(p=>({...p,[t.key]:o}))} style={{
                padding:'4px 10px', borderRadius:6, fontSize:11, fontWeight:500, cursor:'pointer', fontFamily:'inherit',
                background:tweaks[t.key]===o?'var(--accent)':'var(--bg)',
                color:tweaks[t.key]===o?'#fff':'var(--text-2)',
                border:`1px solid ${tweaks[t.key]===o?'var(--accent)':'var(--border)'}`,
              }}>{o}</button>
            ))}
          </div>
        </div>
      ))}
      <div style={{ padding:'10px', background:'var(--bg)', borderRadius:8, fontSize:11, color:'var(--text-3)', marginTop:8 }}>
        Changes apply live in the prototype.
      </div>
    </div>
  );
};

/* ── APP SHELL ───────────────────────────────────────────────────────── */

const App = () => {
  const [screen, setScreen]       = useState(() => localStorage.getItem('cp_screen') || 'login');
  const [focusActive, setFocus]   = useState(false);
  const [focusTime, setFocusTime] = useState(20 * 60);
  const [showTweaks, setShowTweaks] = useState(false);
  const [tweaks, setTweaks]       = useState({ density:'Default', accentColor:'Teal', statusStyle:'Dot', showTime:'Yes' });

  useEffect(() => { localStorage.setItem('cp_screen', screen); }, [screen]);

  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode')   setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const isAuth = ['login','consent','onboarding'].includes(screen);

  return (
    <div style={{ minHeight:'100vh', display:'flex', fontFamily:"'Plus Jakarta Sans', sans-serif" }}>
      {!isAuth && <Sidebar screen={screen} setScreen={setScreen} />}

      <div style={{ flex:1, display:'flex', flexDirection:'column', marginLeft:isAuth?0:'var(--sidebar-w)' }}>
        {!isAuth && (
          <TopBar screen={screen}
            onFocus={()=>{ setFocus(true); setFocusTime(20*60); }}
            focusActive={focusActive} />
        )}

        {focusActive && !isAuth && (
          <FocusBanner onEnd={()=>setFocus(false)} timeLeft={focusTime} setTimeLeft={setFocusTime} />
        )}

        <div style={{ flex:1, overflow:'auto', marginTop:focusActive&&!isAuth?57:0 }}>
          {screen==='login'        && <LoginScreen       setScreen={setScreen} />}
          {screen==='consent'      && <ConsentScreen     setScreen={setScreen} />}
          {screen==='onboarding'   && <OnboardingScreen  setScreen={setScreen} />}
          {screen==='classes'      && <ClassesScreen     setScreen={setScreen} />}
          {screen==='live'         && <LiveScreen />}
          {screen==='policies'     && <PoliciesScreen    setScreen={setScreen} />}
          {screen==='policyEditor' && <PolicyEditorScreen setScreen={setScreen} />}
          {screen==='reports'      && <ReportsScreen />}
          {screen==='settings'     && <SettingsScreen />}
        </div>
      </div>

      <TweaksPanel show={showTweaks} tweaks={tweaks} setTweaks={setTweaks} onClose={()=>setShowTweaks(false)} />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
